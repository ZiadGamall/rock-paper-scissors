<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>

        let name = prompt('What is your name? ');
        let winner = 'none';

            //function to generate the computer's choice
        function getComputerChoice () {
            let choices = ['rock', 'paper', 'scissors'];
            let computerChoice = Math.floor(Math.random() * choices.length); //generates a random number between 0 and 3 (3 exclusive)
            return choices[computerChoice]; //returns the value ; corresponding to the random number generated, from the array
        }
        

                //function to play a round
        function playRound (playerSelection, computerSelection) {


                //using method toLowerCase() to make the player choice cas insensitive
            if (playerSelection.toLowerCase() === 'rock' && computerSelection === 'rock'){
                alert ("It's a draw!");
                winner = 'none';
            }else if (playerSelection.toLowerCase() === 'rock' && computerSelection === 'paper'){
                alert ("You lose! Paper beats rock.");
                winner = 'computer';
            }else if (playerSelection.toLowerCase() === 'rock' && computerSelection === 'scissors'){
                alert ("You win! Rock beats scissors.");
                winner = 'player';
            }else if (playerSelection.toLowerCase() === 'paper' && computerSelection === 'rock'){
                alert ("You win! Paper beats rock.");
                winner = 'player';
            }else if (playerSelection.toLowerCase() === 'paper' && computerSelection === 'paper'){
                alert ("It's a draw!");
                winner = 'none';
            }else if (playerSelection.toLowerCase() === 'paper' && computerSelection === 'scissors'){
                alert ("You lose! Scissors beat paper.");
                winner = 'computer';
            }else if (playerSelection.toLowerCase() === 'scissors' && computerSelection === 'rock'){
                alert ("You lose! Rock beats scissors.");
                winner = 'computer';
            }else if (playerSelection.toLowerCase() === 'scissors' && computerSelection === 'paper'){
                alert ("You win! Scissors beat paper.");
                winner = 'player';
            }else if (playerSelection.toLowerCase() === 'scissors' && computerSelection === 'scissors'){
                alert ("It's a draw!");
                winner = 'none';
            }

        }


            //function to decide the winner in 5 rounds
        function game () {

            let computerScore = 0;  //counting the score of the computer
            let playerScore = 0;    //counting the score of the player
            let round = 0;          //counting the rounds
            
            for (let i = 1; i <= 5; i++) { //for loop to play 5 rounds
                const computerSelection = getComputerChoice(); //getting the choice of the computer
                let playerSelection = prompt("please choose (rock - paper - scissors): "); //getting the choice of the player
                playRound (playerSelection, computerSelection);  //function to play the round!
                if (winner === 'computer') {
                    computerScore +=1;
                }else if (winner === 'player') {
                    playerScore +=1;
                }else {
                    i--; //if it's a draw then we decrement the round counter so we can play 5 rounds
                }
                round++;
                console.log(`Round ${round}`);
                console.log(`${name}: ${playerSelection} - computer: ${computerSelection}`);
                console.log(`${name}'s' score: ${playerScore} - computer's score: ${computerScore}`);
            }
            if (computerScore > playerScore) {
                alert ('The computer wins!')
            }else {
                alert (`${name} wins!`)
            }
        }

        
         //store the computer choice in a variable
        // console.log(playRound(playerSelection, computerSelection));
        // console.log(computerSelection, playerSelection);
        console.log(game());
    </script>
</body>
</html>
